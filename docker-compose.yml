version: '3.8'

services:
  meme-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meme-scanner
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 持久化数据目录
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    networks:
      - meme-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  meme-network:
    driver: bridge
