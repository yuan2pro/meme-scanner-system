version: '3.8'

services:
  meme-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meme-scanner
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - AVE_API_KEY=${AVE_API_KEY:-uHxe2IxOYEx3vHNpUpPtVDJVd2UTPycHLimZkAIpyMxkGS9GE84tf05VU96Uwgdm}
      - AVE_API_BASE=${AVE_API_BASE:-https://prod.ave-api.com}
    networks:
      - meme-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  meme-network:
    driver: bridge
